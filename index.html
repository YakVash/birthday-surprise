<!DOCTYPE html>
<html>
<head>
<title>Birthday Challenge</title>

<style>

body{
margin:0;
background:#0a0a0f;
color:#00f7ff;
font-family:Orbitron, Arial;
text-align:center;
overflow:hidden;
}

h1{
font-size:50px;
margin-top:80px;
text-shadow:0 0 20px #00f7ff;
}

h2{
color:#00f7ff;
text-shadow:0 0 10px #00f7ff;
}

#score{
font-size:24px;
margin-top:10px;
}

#orb{
width:60px;
height:60px;
border-radius:50%;
background:#00f7ff;
position:absolute;
box-shadow:0 0 20px #00f7ff;
cursor:pointer;
}

#gift{
font-size:100px;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
cursor:pointer;
display:none;
transition:left 0.3s, top 0.3s;
}

#message{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#message h1{
font-size:60px;
color:#ff00f7;
text-shadow:0 0 25px #ff00f7;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<h1>LEVEL 1</h1>
<h2>Catch the energy orbs ⚡</h2>

<div id="score">Score: 0 / 5</div>

<div id="orb"></div>

<div id="gift">🎁</div>

<div id="message">
<h1>🎉 HAPPY BIRTHDAY BRO 🎉</h1>
<p>You finally caught the gift 😆</p>
</div>

<script>

let score = 0
let orb = document.getElementById("orb")
let gift = document.getElementById("gift")

moveOrb()

orb.onclick = function(){

score++

document.getElementById("score").innerText =
"Score: " + score + " / 5"

moveOrb()

if(score >= 5){

orb.style.display="none"

document.querySelector("h1").innerText="LEVEL CLEARED"
document.querySelector("h2").innerText="Catch your gift 🎁"

gift.style.display="block"

}

}

function moveOrb(){

let x = Math.random()*(window.innerWidth-80)
let y = Math.random()*(window.innerHeight-80)

orb.style.left = x+"px"
orb.style.top = y+"px"

}

gift.onmousemove = function(){

let x = Math.random()*(window.innerWidth-120)
let y = Math.random()*(window.innerHeight-120)

gift.style.left = x+"px"
gift.style.top = y+"px"

}

gift.onclick = function(){

gift.style.display="none"

document.getElementById("message").style.display="block"

confetti({
particleCount:300,
spread:120,
origin:{y:0.6}
})

}

</script>

</body>
</html>
