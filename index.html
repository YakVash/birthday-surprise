<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Bro 🎉</title>

<style>

body{
    margin:0;
    font-family: Arial;
    text-align:center;
    background: linear-gradient(120deg,#ff9a9e,#fad0c4);
    height:100vh;
}

.container{
    margin-top:120px;
}

h1{
    font-size:60px;
    color:white;
}

p{
    font-size:22px;
    color:white;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#ff4081;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#e91e63;
}

#message{
    display:none;
    font-size:28px;
    margin-top:30px;
}

img{
    width:250px;
    border-radius:20px;
    margin-top:20px;
}

</style>

<script>

function showMessage(){
    document.getElementById("message").style.display="block"
}

</script>

</head>

<body>

<div class="container">

<h1>🎉 Birthday Countdown 🎉</h1>

<h2 id="countdown"></h2>

<div id="surprise" style="display:none">

<h1>🎂 Happy Birthday Bro! 🎂</h1>

<p>You are the best brother ever!</p>

<p>Hope your year is filled with happiness, success and lots of cake 🎉</p>

<img src="brother.jpg" width="250">

</div>

</div>

<script>

var countDate = new Date("Mar 16, 2026 09:00:00").getTime();

var x = setInterval(function(){

var now = new Date().getTime();
var distance = countDate - now;

var days = Math.floor(distance / (1000*60*60*24));
var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
var seconds = Math.floor((distance % (1000*60)) / 1000);

document.getElementById("countdown").innerHTML =
days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

if(distance < 0){

clearInterval(x);

document.getElementById("countdown").style.display="none";
document.getElementById("surprise").style.display="block";

confetti({
particleCount: 200,
spread: 120,
origin: { y: 0.6 }
});

}

},1000);

</script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</body>
</html>
