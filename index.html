<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Bro 🎉</title>

<style>

body{
    margin:0;
    font-family: Arial;
    text-align:center;
    background: linear-gradient(120deg,#ff9a9e,#fad0c4);
    height:100vh;
}

.container{
    margin-top:120px;
}

h1{
    font-size:60px;
    color:white;
}

h2{
    color:white;
}

p{
    font-size:22px;
    color:white;
}

#countdown{
    font-size:40px;
    color:white;
}

img{
    width:250px;
    border-radius:20px;
    margin-top:20px;
}

.gift-box{
font-size:120px;
cursor:pointer;
margin-top:40px;
transition: transform 0.3s;
}

.gift-box:hover{
transform: scale(1.2);
}

.balloons{
position:fixed;
bottom:-150px;
width:100%;
display:flex;
justify-content:space-around;
pointer-events:none;
}

.balloon{
width:60px;
height:80px;
background:red;
border-radius:50%;
animation: float 8s infinite ease-in;
}

.balloon:nth-child(2){background:blue; animation-duration:10s;}
.balloon:nth-child(3){background:yellow; animation-duration:9s;}
.balloon:nth-child(4){background:purple; animation-duration:11s;}
.balloon:nth-child(5){background:green; animation-duration:7s;}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

</style>

</head>

<body>

    <div class="balloons">
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
    </div>

<div class="container">

<h1>🎉 Birthday Countdown 🎉</h1>

<h2 id="countdown"></h2>

<div id="surprise" style="display:none">

<h2>🎁 Click the gift to open your surprise</h2>

<div class="gift-box" onclick="openGift()">🎁</div>

<div id="birthdayMessage" style="display:none">

<h1>🎂 Happy Birthday Bro! 🎂</h1>

<p>You are the best brother ever!</p>

<p>Hope your year is full of happiness, success and lots of cake 🎉</p>

<audio id="music" src="birthday.mp3"></audio>

<img src="brother.jpg">

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

    function openGift(){

        document.querySelector(".gift-box").style.display="none";
        document.getElementById("birthdayMessage").style.display="block";

        document.getElementById("music").play();

        startFireworks();

    }

var countDate = new Date("Mar 16, 2026 09:10:00").getTime();

var x = setInterval(function(){

var now = new Date().getTime();
var distance = countDate - now;

var days = Math.floor(distance / (1000*60*60*24));
var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
var minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
var seconds = Math.floor((distance % (1000*60)) / 1000);

document.getElementById("countdown").innerHTML =
days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

if(distance < 0){

clearInterval(x);

document.getElementById("countdown").style.display="none";
document.getElementById("surprise").style.display="block";

confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
});

}

},1000);

    function startFireworks(){

        setInterval(function(){

        confetti({
        particleCount:150,
        spread:100,
        origin:{x:Math.random(), y:Math.random()/2}
        });

        },800);

    }

</script>



</body>
</html>
