<!DOCTYPE html>
<html>
<head>
<title>Birthday Mission</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#050510;
font-family:'Orbitron',sans-serif;
color:#00f7ff;
text-align:center;
overflow:hidden;
}

/* STAR BACKGROUND */

.stars{
position:fixed;
width:100%;
height:100%;
background:black;
background-image: radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
animation: moveStars 60s linear infinite;
z-index:-1;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

/* TITLES */

h1{
font-size:55px;
margin-top:80px;
text-shadow:0 0 20px #00f7ff;
}

h2{
text-shadow:0 0 10px #00f7ff;
}

#score{
font-size:22px;
margin-top:10px;
}

/* BUTTON */

button{
background:#00f7ff;
border:none;
padding:15px 30px;
font-size:18px;
cursor:pointer;
box-shadow:0 0 15px #00f7ff;
}

/* GAME OBJECTS */

.orb{
width:60px;
height:60px;
border-radius:50%;
background:#00f7ff;
position:absolute;
box-shadow:0 0 25px #00f7ff;
cursor:pointer;
}

.target{
width:60px;
height:60px;
border-radius:50%;
background:#ff00f7;
position:absolute;
box-shadow:0 0 25px #ff00f7;
cursor:pointer;
}

/* GIFTS */

.gift{
font-size:90px;
position:absolute;
cursor:pointer;
display:none;
transition:left .25s, top .25s;
}

/* LEVEL SCREEN */

#levelScreen{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* FINAL MESSAGE */

#message{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#message h1{
font-size:65px;
color:#ff00f7;
text-shadow:0 0 25px #ff00f7;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<div class="stars"></div>

<h1 id="title">BIRTHDAY MISSION</h1>
<h2 id="subtitle">Clear the levels to unlock your gift</h2>

<button id="startBtn">Begin Mission</button>

<div id="score"></div>

<div id="orb" class="orb" style="display:none"></div>
<div id="target" class="target" style="display:none"></div>

<div id="gift1" class="gift">🎁</div>
<div id="gift2" class="gift">🎁</div>
<div id="gift3" class="gift">🎁</div>
<div id="realGift" class="gift">🎁</div>

<div id="levelScreen">

<h1 id="levelMessage"></h1>

<button id="nextLevelBtn">Next Level</button>

</div>

<div id="message">
<h1>🎉 HAPPY BIRTHDAY BRO 🎉</h1>
<p>You completed the mission 😎</p>
</div>

<audio id="music" loop>
<source src="arcadegame.mp3" type="audio/mpeg">
</audio>

<script>

let level = 0
let score = 0

let orb = document.getElementById("orb")
let target = document.getElementById("target")

let gifts = [
document.getElementById("gift1"),
document.getElementById("gift2"),
document.getElementById("gift3")
]

let realGift = document.getElementById("realGift")

/* START GAME */

document.getElementById("startBtn").onclick=function(){

document.getElementById("music").play()

document.getElementById("startBtn").style.display="none"

level=1
score=0

document.getElementById("title").innerText="LEVEL 1"
document.getElementById("subtitle").innerText="Catch the energy orbs ⚡"

orb.style.display="block"
move(orb)

}

/* LEVEL 1 */

orb.onclick=function(){

score++
updateScore()

move(orb)

if(score>=5){

orb.style.display="none"

showLevelComplete("LEVEL 1 COMPLETE",2)

}

}

/* LEVEL 2 */

target.onclick=function(){

score++
updateScore()

move(target)

if(score>=6){

target.style.display="none"

showLevelComplete("LEVEL 2 COMPLETE",3)

}

}

/* NEXT LEVEL BUTTON */

document.getElementById("nextLevelBtn").onclick=function(){

document.getElementById("levelScreen").style.display="none"

score=0
updateScore()

if(level==2){

document.getElementById("title").innerText="LEVEL 2"
document.getElementById("subtitle").innerText="Hit the neon targets 🎯"

target.style.display="block"
move(target)

}

else if(level==3){

document.getElementById("title").innerText="FINAL LEVEL"
document.getElementById("subtitle").innerText="Find the real gift"

spawnGifts()

}

}

/* SHOW LEVEL COMPLETE */

function showLevelComplete(text,nextLevel){

document.getElementById("levelMessage").innerText=text
document.getElementById("levelScreen").style.display="block"

level=nextLevel

confetti({
particleCount:150,
spread:100
})

}

/* MOVE OBJECT */

function move(obj){

let x=Math.random()*(window.innerWidth-100)
let y=Math.random()*(window.innerHeight-100)

obj.style.left=x+"px"
obj.style.top=y+"px"

}

/* SCORE */

function updateScore(){
document.getElementById("score").innerText="Score: "+score
}

/* SPAWN GIFTS */

function spawnGifts(){

gifts.forEach(g=>{
g.style.display="block"
move(g)
g.onmouseover=runAway
})

realGift.style.display="block"
move(realGift)

realGift.onmousemover=runAway
realGift.onclick=win

}

/* GIFT RUN AWAY */

function runAway(){

let x=Math.random()*(window.innerWidth-120)
let y=Math.random()*(window.innerHeight-120)

this.style.left=x+"px"
this.style.top=y+"px"

}

/* WIN */

function win(){

document.querySelectorAll(".gift").forEach(g=>g.style.display="none")

document.getElementById("message").style.display="block"

confetti({
particleCount:400,
spread:120,
origin:{y:0.6}
})

}

</script>

</body>
</html>
