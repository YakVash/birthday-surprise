<!DOCTYPE html>
<html>
<head>
<title>Birthday Challenge</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#050510;
font-family:'Orbitron',sans-serif;
color:#00f7ff;
text-align:center;
overflow:hidden;
}

/* CYBER GRID BACKGROUND */

.grid{
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(#111 1px, transparent 1px),
linear-gradient(90deg,#111 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* TITLES */

h1{
font-size:55px;
margin-top:80px;
text-shadow:0 0 20px #00f7ff;
}

h2{
text-shadow:0 0 10px #00f7ff;
}

/* SCORE */

#score{
font-size:22px;
margin-top:10px;
}

/* ORB GAME */

#orb{
width:60px;
height:60px;
border-radius:50%;
background:#00f7ff;
position:absolute;
box-shadow:0 0 25px #00f7ff;
cursor:pointer;
}

/* GIFT */

#gift{
font-size:110px;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
cursor:pointer;
display:none;
transition:left 0.25s, top 0.25s;
}

/* FINAL MESSAGE */

#message{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#message h1{
font-size:65px;
color:#ff00f7;
text-shadow:0 0 30px #ff00f7;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<div class="grid"></div>

<h1>LEVEL 1</h1>
<h2>Catch the Energy Orbs ⚡</h2>

<div id="score">Score: 0 / 6</div>

<div id="orb"></div>

<div id="gift">🎁</div>

<div id="message">

<h1>🎉 HAPPY BIRTHDAY BRO 🎉</h1>

<p>You beat the game 😎</p>

<p>Have an awesome year ahead!</p>

</div>

<audio id="music" autoplay loop>
<source src="techno.mp3" type="audio/mpeg">
</audio>

<script>

/* LEVEL 1 GAME */

let score = 0
let orb = document.getElementById("orb")
let gift = document.getElementById("gift")

moveOrb()

orb.onclick = function(){

score++

document.getElementById("score").innerText =
"Score: " + score + " / 6"

moveOrb()

if(score >= 6){

orb.style.display="none"

document.querySelector("h1").innerText="LEVEL CLEARED"
document.querySelector("h2").innerText="Catch the gift to unlock it"

gift.style.display="block"

}

}

function moveOrb(){

let x = Math.random()*(window.innerWidth-80)
let y = Math.random()*(window.innerHeight-80)

orb.style.left = x+"px"
orb.style.top = y+"px"

}

/* GIFT BOSS LEVEL */

gift.onmousemove = function(){

let x = Math.random()*(window.innerWidth-120)
let y = Math.random()*(window.innerHeight-120)

gift.style.left = x+"px"
gift.style.top = y+"px"

}

/* FINAL WIN */

gift.onclick = function(){

gift.style.display="none"

document.getElementById("message").style.display="block"

confetti({
particleCount:350,
spread:120,
origin:{y:0.6}
})

}

</script>

</body>
</html>
