<!DOCTYPE html>
<html>
<head>
<title>Birthday Mission</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#04040a;
font-family:'Orbitron',sans-serif;
color:#00f7ff;
text-align:center;
overflow:hidden;
}

/* CYBER GRID */

.grid{
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(#111 1px, transparent 1px),
linear-gradient(90deg,#111 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* TITLES */

h1{
font-size:55px;
margin-top:70px;
text-shadow:0 0 20px #00f7ff;
}

h2{
text-shadow:0 0 10px #00f7ff;
}

/* SCORE */

#score{
font-size:22px;
margin-top:10px;
}

/* LEVEL OBJECTS */

.orb{
width:60px;
height:60px;
border-radius:50%;
background:#00f7ff;
position:absolute;
box-shadow:0 0 25px #00f7ff;
cursor:pointer;
}

.target{
width:60px;
height:60px;
border-radius:50%;
background:#ff00f7;
position:absolute;
box-shadow:0 0 25px #ff00f7;
cursor:pointer;
}

/* GIFT */

#gift{
font-size:110px;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
cursor:pointer;
display:none;
transition:left 0.25s, top 0.25s;
}

/* FINAL MESSAGE */

#message{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

#message h1{
font-size:70px;
color:#ff00f7;
text-shadow:0 0 30px #ff00f7;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</head>

<body>

<div class="grid"></div>

<h1 id="title">LEVEL 1</h1>
<h2 id="subtitle">Catch the Energy Orbs ⚡</h2>

<div id="score">Score: 0</div>

<div id="orb" class="orb"></div>
<div id="target" class="target" style="display:none"></div>

<div id="gift">🎁</div>

<div id="message">
<h1>🎉 HAPPY BIRTHDAY BRO 🎉</h1>
<p>You completed the mission 😎</p>
</div>

<script>

/* VARIABLES */

let score = 0
let level = 1

let orb = document.getElementById("orb")
let target = document.getElementById("target")
let gift = document.getElementById("gift")

moveObject(orb)

/* LEVEL 1 */

orb.onclick = function(){

score++
updateScore()

moveObject(orb)

if(score >= 5){

level = 2
score = 0

orb.style.display="none"
target.style.display="block"

document.getElementById("title").innerText="LEVEL 2"
document.getElementById("subtitle").innerText="Hit the Neon Targets 🎯"

moveObject(target)

}

}

/* LEVEL 2 */

target.onclick = function(){

score++
updateScore()

moveObject(target)

if(score >= 6){

level = 3
target.style.display="none"

document.getElementById("title").innerText="FINAL LEVEL"
document.getElementById("subtitle").innerText="Catch the Gift 🎁"

gift.style.display="block"

}

}

/* MOVE OBJECT */

function moveObject(obj){

let x = Math.random()*(window.innerWidth-100)
let y = Math.random()*(window.innerHeight-100)

obj.style.left = x+"px"
obj.style.top = y+"px"

}

/* SCORE */

function updateScore(){
document.getElementById("score").innerText="Score: "+score
}

/* GIFT DODGE */

gift.onmousemove = function(){

let x = Math.random()*(window.innerWidth-120)
let y = Math.random()*(window.innerHeight-120)

gift.style.left = x+"px"
gift.style.top = y+"px"

}

/* WIN */

gift.onclick = function(){

gift.style.display="none"

document.getElementById("message").style.display="block"

confetti({
particleCount:400,
spread:120,
origin:{y:0.6}
})

}

</script>

</body>
</html>
